<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Body Segmentation - Masque d'images</title>
    
    <!-- P5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    
    <!-- ML5.js -->
    <script src="https://unpkg.com/ml5@1.0.2/dist/ml5.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(gray, gray);
            background-size: cover;
        }
        
        /* Image révélée par le masque du corps */
        #revealed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: red;
            z-index: 10;
        }
        
        /* Canvas p5.js invisible */
        canvas {
            display: none !important;
        }
        
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 100;
            font-size: 14px;
        }
        
        #debug {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: lime;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
            font-family: monospace;
            font-size: 12px;
            display: none;
        }
        
        #success {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 180, 0, 0.95);
            color: white;
            padding: 40px 60px;
            border-radius: 20px;
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            z-index: 200;
            display: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        #success.show {
            display: block;
            animation: pop 0.5s ease-out;
        }
        
        @keyframes pop {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
        
        /* Zone de proposition de mots */
        #input-zone {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        #mot-input {
            padding: 15px 25px;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            background: rgba(255,255,255,0.95);
            color: #333;
            width: 300px;
            outline: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        
        #mot-input::placeholder {
            color: #999;
        }
        
        #btn-proposer {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }
        
        #btn-proposer:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        #btn-proposer:active {
            transform: scale(0.98);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body>
    <div id="revealed"></div>
    
    <div id="status">Chargement...</div>
    <div id="debug"></div>
    <div id="success"></div>
    
    <div id="input-zone">
        <input type="text" id="mot-input" placeholder="Propose un mot..." autocomplete="off">
        <button id="btn-proposer">Proposer</button>
    </div>
    
    <script src="recepteur2.js"></script>
</body>
</html>
